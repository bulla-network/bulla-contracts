on:
    push:
        branches:
            - master

    pull_request:

env:
    FOUNDRY_PROFILE: ci

jobs:
    check:
        name: 'Forge Tests + Gas 🧪'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'yarn'

            - name: Install Foundry
              uses: onbjerg/foundry-toolchain@v1
              with:
                  version: nightly

            - name: Install dependencies
              run: |
                  forge install
                  yarn

            - name: Run forge build
              run: |
                  forge --version
                  forge build --sizes
              id: build

            - name: Run tests with fuzzing
              run: forge test -vvv --gas-report

            - name: Notify bulla-registry
              if: github.ref == 'refs/heads/master' && github.event_name == 'push'
              run: |
                  curl -X POST \
                    -H "Authorization: Bearer ${{ secrets.REGISTRY_DISPATCH_TOKEN }}" \
                    https://api.github.com/repos/bulla-network/bulla-registry/dispatches \
                    -d '{"event_type":"source-updated","client_payload":{"repo":"${{ github.repository }}"}}'
